sonar.projectKey=flask-api-backend
sonar.projectName=Flask API Backend
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=test_*.py

# Exclusions
sonar.exclusions=venv/**,__pycache__/**,.git/**,*.pyc

# Python specific settings
sonar.python.version=3.9
sonar.python.coverage.reportPaths=coverage.xml

# Test coverage
sonar.coverage.exclusions=test_*.py,**/tests/**

# Quality gate - fail if any of these are broken
sonar.qualitygate.wait=true
